				hash = "#page2";
			}

			if (window.location.hash !== hash) {
				window.location.hash = hash;
			}
		}

		function syncPageByHash() {
			if (window.location.hash === "#page2") {
				showPage("page2");
			} else if (window.location.hash === "#intro") {
				showPage("intro");
			} else {
				showPage("page1");
			}
		}

		function createRoomButtons() {
			const roomNames = ["garden", "kitchen", "living room", "bathroom", "bedroom"];
			roomNav.innerHTML = "";

			roomNames.forEach((roomName) => {
				const btn = document.createElement("button");
				btn.type = "button";
				btn.className = "room-btn";
				btn.textContent = roomName;
				btn.dataset.room = roomName;

				btn.addEventListener("click", () => {
					selectedRoom = roomName;
					selectedDateId = "";
					updateRoomButtonState();
					renderDates(roomName);
					mediaWrap.classList.add("hidden");
					mediaWrap.innerHTML = "";
				});

				roomNav.appendChild(btn);
			});
		}

		function updateRoomButtonState() {
			const buttons = roomNav.querySelectorAll(".room-btn");
			buttons.forEach((btn) => {
				btn.classList.toggle("active", btn.dataset.room === selectedRoom);
			});
		}

		function getRoomDateBaseFontSize() {
			const rootStyles = getComputedStyle(document.documentElement);
			const value = parseFloat(rootStyles.getPropertyValue("--room-date-size"));
			if (Number.isFinite(value) && value > 0) {
				return value;
			}

			return 19;
		}

		function getDateLayoutProfile() {
			const isMobileViewport = window.matchMedia("(max-width: 760px)").matches;
			if (!isMobileViewport) {
				return {
					fontBoost: 1,
					spacingCompression: 1,
					horizontalPadding: DATE_LAYOUT.horizontalPadding,
					labelPadding: DATE_LAYOUT.labelPadding,
					activeStatePadding: DATE_LAYOUT.activeStatePadding
				};
			}

			return {
				fontBoost: 1.32,
				spacingCompression: 0.93,
				horizontalPadding: 5,
				labelPadding: 9,
				activeStatePadding: 2
			};
		}

		function measureDateLabelWidth(label, baseFontSize, profile) {
			if (!dateMeasureContext) {
				return 60;
			}

			dateMeasureContext.font = "400 " + baseFontSize + "px \"EB Garamond\", serif";
			const regularWidth = dateMeasureContext.measureText(label).width;

			dateMeasureContext.font = "700 " + baseFontSize + "px \"Helvetica\", \"Arial\", sans-serif";
			const activeWidth = dateMeasureContext.measureText(label).width;

			return Math.ceil(Math.max(regularWidth, activeWidth) + profile.labelPadding + profile.activeStatePadding);
		}

		function getDateLayout(dateItems) {
			const layoutProfile = getDateLayoutProfile();
			const baseFontSize = getRoomDateBaseFontSize() * layoutProfile.fontBoost;
			const wrapWidth = Math.max(1, Math.floor(datesWrap.getBoundingClientRect().width));
			let minX = Infinity;
			let maxRight = -Infinity;
			let maxY = 0;
			const labelWidthsById = {};

			dateItems.forEach((item) => {
				const label = item.text || item.label || "";
				const labelWidth = measureDateLabelWidth(label, baseFontSize, layoutProfile);
				const scaledX = item.x * layoutProfile.spacingCompression;
				labelWidthsById[item.id] = labelWidth;

				if (scaledX < minX) {
					minX = scaledX;
				}

				const rightEdge = scaledX + labelWidth;
				if (rightEdge > maxRight) {
					maxRight = rightEdge;
				}

				if (item.y > maxY) {
					maxY = item.y;
				}
			});

			const contentWidth =
				(maxRight - minX) +
				(layoutProfile.horizontalPadding * 2);
			const scale = Math.min(1, wrapWidth / contentWidth);
			const canvasWidth = Math.ceil(contentWidth * scale);
			const centerOffset = Math.max(0, Math.floor((wrapWidth - canvasWidth) / 2));

			return {
				baseFontSize,
				scale,
				minX,
				spacingCompression: layoutProfile.spacingCompression,
				horizontalPadding: layoutProfile.horizontalPadding,
				centerOffset,
				labelWidthsById,
				canvasWidth,
				canvasHeight: Math.ceil((maxY + DATE_LAYOUT.verticalPadding) * scale)
			};
		}

		function renderDates(roomName) {
			const roomInfo = ROOM_DATA[roomName];
			const dateItems = roomInfo.dates;
			datesWrap.classList.remove("hidden");
			const layout = getDateLayout(dateItems);

			datesCanvas.innerHTML = "";
			datesCanvas.className = "dates-canvas room-" + roomName.replace(/\s+/g, "-");
			datesCanvas.style.width = layout.canvasWidth + "px";
			datesCanvas.style.height = layout.canvasHeight + "px";
			datesCanvas.style.marginLeft = layout.centerOffset + "px";

			dateItems.forEach((item) => {
				const dateBtn = document.createElement("button");
				dateBtn.type = "button";
				dateBtn.className = "date-btn";
				dateBtn.textContent = item.text || item.label;
				dateBtn.dataset.dateId = item.id;
				const scaledX = item.x * layout.spacingCompression;
				dateBtn.style.left =
					((scaledX - layout.minX + layout.horizontalPadding) * layout.scale) + "px";
				dateBtn.style.top = (item.y * layout.scale) + "px";
				dateBtn.style.fontSize = (layout.baseFontSize * layout.scale) + "px";
				dateBtn.style.minWidth = (layout.labelWidthsById[item.id] * layout.scale) + "px";

				dateBtn.addEventListener("click", () => {
					selectedDateId = item.id;
					updateDateButtonState();
					renderMedia(roomName, item.id, item.label);
				});

				datesCanvas.appendChild(dateBtn);
			});

			if (selectedDateId) {
				updateDateButtonState();
			}
		}

		function updateDateButtonState() {
			const buttons = datesCanvas.querySelectorAll(".date-btn");
			buttons.forEach((btn) => {
				btn.classList.toggle("active", btn.dataset.dateId === selectedDateId);
			});
		}

		function getMediaData(roomName, dateId) {
			const roomInfo = ROOM_DATA[roomName];
			if (!roomInfo || !roomInfo.mediaByDate) {
				return null;
			}

			const defaultMedia = roomInfo.mediaByDate.default || {};
			const dateMedia = roomInfo.mediaByDate[dateId] || {};

			return {
				image: {
					...(defaultMedia.image || {}),
					...(dateMedia.image || {}),
					...(MEDIA_LEFT_OFFSETS[dateId] !== undefined ? { left: MEDIA_LEFT_OFFSETS[dateId] } : {}),
					...(IMAGE_SIZE_OVERRIDES[dateId] || {})
				},
				caption: {
					...(defaultMedia.caption || {}),
					...(dateMedia.caption || {})
				},
				imageSrc: dateMedia.imageSrc || defaultMedia.imageSrc || ""
			};
		}

		function renderCaptionText(captionElement, text) {
			const lines = String(text || "").split("\n");
			captionElement.innerHTML = "";

			lines.forEach((lineText, index) => {
				const line = document.createElement("span");
				line.className = "caption-line";
				line.textContent = lineText.length ? lineText : "\u00a0";
				captionElement.appendChild(line);
			});
		}

		renderCaptionText(
			introCopy,
			"네가 이곳을 발견하기 전에 여기서 무슨 일이 있었는지, 아마 상상도 못할 거야. 집 곳곳에 거짓과 진실이 섞인 메모를 흩뿌려 놨어. 너는 그걸 구분할 수 없겠지. 피차 편해질 거야. 어느 쪽도 믿을 수 없을 테니까. 안으로 들어와. 들어와서 내 이야기를 다 듣고, 어떤 게 진실인지 네 눈으로 직접 확인해 봐. 여긴 나와 가족들이 살고 있어. 귓불이 찢어질 때까지 내 이야기를 들어 줘. 응? 제발, 제발, 제발."
		);

		function renderMedia(roomName, dateId, dateLabel) {
			const mediaData = getMediaData(roomName, dateId);
			if (!mediaData) {
				mediaWrap.className = "media-wrap hidden";
				mediaWrap.innerHTML = "";
				if (mediaRevealObserver) {
					mediaRevealObserver.disconnect();
					mediaRevealObserver = null;
				}
				return;
			}

			const roomClass = "room-" + roomName.replace(/\s+/g, "-");
			const dateClass = "date-" + dateId;
			mediaWrap.className = "media-wrap media-reveal " + roomClass + " " + dateClass;
			mediaWrap.innerHTML = "";
			mediaWrap.classList.remove("is-visible");

			if (mediaRevealObserver) {
				mediaRevealObserver.disconnect();
			}

			if ("IntersectionObserver" in window) {
				mediaRevealObserver = new IntersectionObserver(
					(entries) => {
						entries.forEach((entry) => {
							if (entry.isIntersecting) {
								mediaWrap.classList.add("is-visible");
							} else {
								mediaWrap.classList.remove("is-visible");
							}
						});
					},
					{
						root: null,
						threshold: 0.22,
						rootMargin: "0px 0px -12% 0px"
					}
				);

				mediaRevealObserver.observe(mediaWrap);
			} else {
				mediaWrap.classList.add("is-visible");
			}

			const caption = document.createElement("p");
			caption.className = "media-caption";
			renderCaptionText(caption, mediaData.caption.text);
			caption.style.setProperty("--caption-left", mediaData.caption.left + "px");
			caption.style.setProperty("--caption-top", mediaData.caption.top + "px");

			const captionFirst = CAPTION_FIRST_MEDIA_IDS.has(dateId);

			if (captionFirst) {
				mediaWrap.appendChild(caption);
			}

			if (mediaData.imageSrc) {
				const slot = document.createElement("div");
				slot.className = "image-slot media-image-slot";
				slot.style.setProperty("--media-width", mediaData.image.width + "px");
				slot.style.setProperty("--media-left", mediaData.image.left + "px");
				slot.style.setProperty("--media-top", mediaData.image.top + "px");

				const img = document.createElement("img");
				img.src = withAssetVersion(mediaData.imageSrc);
				img.alt = roomName + " " + dateLabel + " image";
				img.loading = "lazy";
				slot.appendChild(img);
				mediaWrap.appendChild(slot);
			}

			if (!captionFirst) {
				mediaWrap.appendChild(caption);
			}
		}

		toPage2Btn.addEventListener("click", () => {
			setHashPage("intro");
			showPage("intro");
		});

		toPage1Title.addEventListener("click", () => {
			resetSelectionState();
			setHashPage("page1");
		});

		pageIntro.addEventListener("click", () => {
			setHashPage("page2");
			showPage("page2");
		});

		let datesResizeRafId = null;
		window.addEventListener("resize", () => {
			if (!selectedRoom) {
				return;
			}

			if (datesResizeRafId !== null) {
				cancelAnimationFrame(datesResizeRafId);
			}

			datesResizeRafId = requestAnimationFrame(() => {
				datesResizeRafId = null;
				renderDates(selectedRoom);
			});
		});

		if (document.fonts && document.fonts.ready) {
			document.fonts.ready.then(() => {
				if (selectedRoom) {
					renderDates(selectedRoom);
				}
			});
		}

		window.addEventListener("hashchange", syncPageByHash);

		createRoomButtons();
		syncPageByHash();
	</script>
</body>
</html>
